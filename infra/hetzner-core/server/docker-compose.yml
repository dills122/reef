x-service-hardening: &service-hardening
  init: true
  pids_limit: 512
  security_opt:
    - no-new-privileges:true

x-app-hardening: &app-hardening
  <<: *service-hardening
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:
  postgres:
    <<: *service-hardening
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=${REEF_PG_MAX_CONNECTIONS:-240}"
      - "-c"
      - "max_wal_size=${REEF_PG_MAX_WAL_SIZE:-16GB}"
      - "-c"
      - "min_wal_size=${REEF_PG_MIN_WAL_SIZE:-4GB}"
      - "-c"
      - "checkpoint_timeout=${REEF_PG_CHECKPOINT_TIMEOUT:-15min}"
      - "-c"
      - "checkpoint_completion_target=${REEF_PG_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${REEF_PG_WAL_COMPRESSION:-on}"
      - "-c"
      - "log_checkpoints=${REEF_PG_LOG_CHECKPOINTS:-on}"
    env_file:
      - ./secrets/db.env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-admin:
    <<: *service-hardening
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./secrets/postgres-admin.env
    volumes:
      - pgdata_admin:/var/lib/postgresql/data
      - ./postgres-admin/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-analytics:
    <<: *service-hardening
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./secrets/postgres-analytics.env
    volumes:
      - pgdata_analytics:/var/lib/postgresql/data
      - ./postgres-analytics/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  openbao:
    <<: *service-hardening
    image: openbao/openbao:2.5.5
    restart: unless-stopped
    command: server -config=/bao/config/openbao.hcl
    env_file:
      - ./secrets/openbao.env
    volumes:
      - ./openbao/config:/bao/config:ro
      - ./openbao/logs:/bao/logs
    ports:
      - "127.0.0.1:${REEF_BACKBONE_OPENBAO_HOST_PORT:-8200}:8200"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  matching-engine:
    <<: *app-hardening
    image: ${REEF_MATCHING_ENGINE_IMAGE:-dills122/reef-matching-engine:latest}
    restart: unless-stopped
    env_file:
      - ./secrets/matching-engine.env
    expose:
      - "8081"
    networks:
      - internal

  platform-runtime:
    <<: *app-hardening
    image: ${REEF_PLATFORM_RUNTIME_IMAGE:-dills122/reef-platform-runtime:latest}
    restart: unless-stopped
    env_file:
      - ./secrets/platform-runtime.env
    ports:
      - "127.0.0.1:${REEF_BACKBONE_PLATFORM_HOST_PORT:-8080}:8080"
    expose:
      - "8080"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_started
      matching-engine:
        condition: service_started

  caddy:
    <<: *app-hardening
    image: caddy:2-alpine
    profiles:
      - public
    restart: unless-stopped
    ports:
      - "${REEF_BACKBONE_HTTP_HOST_PORT:-80}:80"
      - "${REEF_BACKBONE_HTTPS_HOST_PORT:-443}:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.example.invalid}
    env_file:
      - ./secrets/caddy.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./arena-admin:/srv/arena-admin:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - platform-runtime
      - deploy-receiver

  deploy-receiver:
    <<: *app-hardening
    build:
      context: ./deploy-receiver
    restart: unless-stopped
    env_file:
      - path: ./secrets/deploy-receiver.env
        required: false
    expose:
      - "8090"
    volumes:
      - ./arena-admin:/srv/arena-admin
      - ./arena-admin-releases:/srv/arena-admin-releases
    networks:
      - internal

  simulator:
    <<: *app-hardening
    image: ${REEF_SIMULATOR_IMAGE:-dills122/reef-simulator:latest}
    profiles:
      - manual
    env_file:
      - ./secrets/simulator.env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_started
      platform-runtime:
        condition: service_started

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  pgdata_admin:
  pgdata_analytics:
  caddy_data:
  caddy_config:
