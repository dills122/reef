apiVersion: v1
kind: ConfigMap
metadata:
  name: reef-postgres-init
  namespace: reef-local
data:
  001_create_domain_schemas.sql: |
    CREATE SCHEMA IF NOT EXISTS runtime;
    CREATE SCHEMA IF NOT EXISTS auth;
    CREATE SCHEMA IF NOT EXISTS admin;
    CREATE SCHEMA IF NOT EXISTS boundary;
    CREATE SCHEMA IF NOT EXISTS orchestration;
    CREATE SCHEMA IF NOT EXISTS analytics;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: reef-local
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: reef-local
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: reef
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          args:
            - postgres
            - -c
            - max_connections=200
            - -c
            - max_wal_size=16GB
            - -c
            - min_wal_size=4GB
            - -c
            - checkpoint_timeout=15min
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - wal_compression=on
          env:
            - name: POSTGRES_DB
              value: reef
            - name: POSTGRES_USER
              value: reef
            - name: POSTGRES_PASSWORD
              value: reef
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "reef", "-d", "reef"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "reef", "-d", "reef"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init
          configMap:
            name: reef-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
