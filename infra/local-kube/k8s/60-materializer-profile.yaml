          resources:
            requests:
              cpu: 150m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: "1"
              memory: 1536Mi
              ephemeral-storage: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
