              value: inmemory
            - name: EXTERNAL_API_COMMAND_CAPTURE_MODE
              value: disabled
            - name: EXTERNAL_API_COMMAND_LOG_MODE
              value: disabled
            - name: JAVA_TOOL_OPTIONS
              value: -XX:+ExitOnOutOfMemoryError -XX:MaxRAMPercentage=70 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
          ports:
            - containerPort: 8080
