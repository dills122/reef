            - name: STREAM_ACK_WORKER_ENABLED
              value: "false"
            - name: STREAM_ACK_PROJECTOR_ENABLED
              value: "false"
            - name: EXTERNAL_API_COMMAND_ASYNC_WORKER_ENABLED
              value: "false"
