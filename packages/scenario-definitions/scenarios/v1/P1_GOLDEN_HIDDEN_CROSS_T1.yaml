schemaVersion: "1.0"
pathId: "P1_GOLDEN_HIDDEN_CROSS_T1"
name: "Golden Hidden Resting Cross"
businessGoal: "Prove hidden-liquidity partial fill, full fill, public visibility, and deterministic replay."
seed: 424242

preconditions:
  market:
    assetClass: "US_EQ"
    settlementCycle: "T+1"
    venueType: "DARK_POOL_SIM"
    matchingMode: "HIDDEN_MIDPOINT_CROSS"
  referenceData:
    instruments:
      - instrumentId: "XYZ"
        symbol: "XYZ"
    participants:
      - participantId: "HIDDEN_SELLER_A"
      - participantId: "VISIBLE_BUYER_B"
      - participantId: "VISIBLE_BUYER_C"
    accounts:
      - accountId: "HIDDEN_SELLER_A_MAIN"
        participantId: "HIDDEN_SELLER_A"
      - accountId: "VISIBLE_BUYER_B_MAIN"
        participantId: "VISIBLE_BUYER_B"
      - accountId: "VISIBLE_BUYER_C_MAIN"
        participantId: "VISIBLE_BUYER_C"

runContext:
  clock:
    mode: "SIMULATED"
    timezone: "America/New_York"
  actorDefaults:
    initiatingActorType: "BOT"
  metadata:
    scenarioRunRequiredFields:
      - "scenarioRunId"
      - "seed"
      - "correlationId"
      - "causationId"

faultInjection:
  enabled: false
  faults: []

steps:
  - sequence: 1
    command: "SubmitOrder"
    description: "Participant A submits hidden resting sell order."
    payload:
      side: "SELL"
      instrumentId: "XYZ"
      quantity: 100
      orderType: "LIMIT_HIDDEN"
      limitPrice: "100000000000"
      visibility: "HIDDEN"
      accountId: "HIDDEN_SELLER_A_MAIN"
  - sequence: 2
    command: "SubmitOrder"
    description: "Participant B submits visible buy that partially fills hidden sell."
    payload:
      side: "BUY"
      instrumentId: "XYZ"
      quantity: 40
      orderType: "LIMIT"
      limitPrice: "101000000000"
      visibility: "VISIBLE"
      accountId: "VISIBLE_BUYER_B_MAIN"
  - sequence: 3
    command: "SubmitOrder"
    description: "Participant C submits visible buy that fills the hidden sell remainder."
    payload:
      side: "BUY"
      instrumentId: "XYZ"
      quantity: 60
      orderType: "LIMIT"
      limitPrice: "100000000000"
      visibility: "VISIBLE"
      accountId: "VISIBLE_BUYER_C_MAIN"
  - sequence: 4
    command: "CompleteScenarioRun"

expectedEvents:
  - "ScenarioRunStarted"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "ExecutionCreated"
  - "TradeCreated"
  - "OrderPartiallyFilled"
  - "PublicDepthChecked"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "ExecutionCreated"
  - "TradeCreated"
  - "OrderFilled"
  - "TradeTapeChecked"
  - "OwnOrderVisibilityChecked"
  - "ScenarioRunCompleted"

expectedEventTimeline:
  anchor: "scenarioStart"
  events:
    - eventType: "ScenarioRunStarted"
      occurredAtOffsetSeconds: 0
    - eventType: "OrderSubmitted"
      occurredAtOffsetSeconds: 1
    - eventType: "OrderAccepted"
      occurredAtOffsetSeconds: 1
    - eventType: "OrderSubmitted"
      occurredAtOffsetSeconds: 2
    - eventType: "OrderAccepted"
      occurredAtOffsetSeconds: 2
    - eventType: "ExecutionCreated"
      occurredAtOffsetSeconds: 3
    - eventType: "TradeCreated"
      occurredAtOffsetSeconds: 3
    - eventType: "OrderPartiallyFilled"
      occurredAtOffsetSeconds: 4
    - eventType: "PublicDepthChecked"
      occurredAtOffsetSeconds: 5
    - eventType: "OrderSubmitted"
      occurredAtOffsetSeconds: 6
    - eventType: "OrderAccepted"
      occurredAtOffsetSeconds: 6
    - eventType: "ExecutionCreated"
      occurredAtOffsetSeconds: 7
    - eventType: "TradeCreated"
      occurredAtOffsetSeconds: 7
    - eventType: "OrderFilled"
      occurredAtOffsetSeconds: 8
    - eventType: "TradeTapeChecked"
      occurredAtOffsetSeconds: 9
    - eventType: "OwnOrderVisibilityChecked"
      occurredAtOffsetSeconds: 9
    - eventType: "ScenarioRunCompleted"
      occurredAtOffsetSeconds: 10

expectedFinalStates:
  hiddenSellOrder: "FILLED"
  firstVisibleBuy: "FILLED"
  secondVisibleBuy: "FILLED"
  executions: "2"
  trades: "2"
  totalExecutedQuantity: "100"
  scenarioRun: "COMPLETED"

invariants:
  - "Hidden sell order transitions OPEN -> PARTIALLY_FILLED -> FILLED."
  - "First visible buy fills 40 at resting price 100.00."
  - "Second visible buy fills 60 at resting price 100.00."
  - "Public top-of-book/depth never exposes hidden resting size before execution."
  - "Trade tape shows two trades without counterparty identity."
  - "Hidden seller own-order read can see its own hidden order and lifecycle state."
  - "All scenario-driven events contain scenarioRunId/correlationId/causationId."

uiAssertions:
  - "Timeline shows hidden rest -> partial fill -> full fill for one hidden order."
  - "Public market-data view hides resting hidden size."
  - "Own-order view shows hidden seller lifecycle state."
  - "Scenario run detail shows seed=424242 and status=COMPLETED."

replayAssertions:
  - "Given seed=424242 and same preconditions, expectedEvents sequence is identical."
  - "Given seed=424242 and same preconditions, expectedEventTimeline occurredAt offsets are identical and monotonic."
  - "Replay produces identical command outcome order, execution/trade facts, lifecycle states, and checksums."

idempotencyAssertions:
  - command: "SubmitOrder"
    assertion: "Duplicate commandId does not create a second order."
  - command: "CompleteScenarioRun"
    assertion: "Duplicate commandId does not produce duplicate scenario completion transitions."
