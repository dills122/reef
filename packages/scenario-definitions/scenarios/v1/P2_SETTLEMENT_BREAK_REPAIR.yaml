schemaVersion: "1.0"
pathId: "P2_SETTLEMENT_BREAK_REPAIR"
name: "Settlement Break and Repair"
businessGoal: "Prove deterministic fail -> exception -> repair -> retry settlement lifecycle."
seed: 424243

preconditions:
  market:
    assetClass: "US_EQ"
    settlementCycle: "T+1"
    venueType: "DARK_POOL_SIM"
    matchingMode: "HIDDEN_MIDPOINT_CROSS"
  referenceData:
    instruments:
      - instrumentId: "XYZ"
        symbol: "XYZ"
    participants:
      - participantId: "BUY_SIDE_1"
      - participantId: "SELL_SIDE_1"
    accounts:
      - accountId: "BUY_SIDE_1_MAIN"
        participantId: "BUY_SIDE_1"
      - accountId: "SELL_SIDE_1_MAIN"
        participantId: "SELL_SIDE_1"
  policyProfiles:
    settlementFailureType: "SSI_MISMATCH"

runContext:
  clock:
    mode: "SIMULATED"
    timezone: "America/New_York"
  actorDefaults:
    initiatingActorType: "BOT"
    repairActorType: "USER"
  metadata:
    scenarioRunRequiredFields:
      - "scenarioRunId"
      - "seed"
      - "correlationId"
      - "causationId"

faultInjection:
  enabled: true
  faults:
    - faultId: "FAULT_SETTLEMENT_SSI_MISMATCH"
      triggerStepSequence: 9
      action: "FAIL_SETTLEMENT"
      expectedFailureEvent: "SettlementFailed"
      expectedExceptionEvent: "ExceptionOpened"

steps:
  - sequence: 1
    command: "SubmitOrder"
    description: "Submit hidden buy order."
    payload:
      side: "BUY"
      instrumentId: "XYZ"
      quantity: 1000
      orderType: "LIMIT_HIDDEN"
      limitPrice: "MIDPOINT"
      accountId: "BUY_SIDE_1_MAIN"
  - sequence: 2
    command: "SubmitOrder"
    description: "Submit hidden sell order."
    payload:
      side: "SELL"
      instrumentId: "XYZ"
      quantity: 1000
      orderType: "LIMIT_HIDDEN"
      limitPrice: "MIDPOINT"
      accountId: "SELL_SIDE_1_MAIN"
  - sequence: 3
    command: "MatchOrders"
  - sequence: 4
    command: "CreateTrade"
  - sequence: 5
    command: "AllocateTrade"
  - sequence: 6
    command: "GenerateConfirmation"
  - sequence: 7
    command: "AffirmTrade"
  - sequence: 8
    command: "CreateSettlementObligation"
  - sequence: 9
    command: "AdvanceSettlement"
    description: "Fault injector forces settlement failure."
  - sequence: 10
    command: "OpenException"
  - sequence: 11
    command: "ResolveException"
    description: "Operator repairs settlement data."
    payload:
      repairAction: "UPDATE_SSI"
  - sequence: 12
    command: "RetrySettlement"
  - sequence: 13
    command: "CompleteSettlement"
  - sequence: 14
    command: "CompleteScenarioRun"

expectedEvents:
  - "ScenarioRunStarted"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "ExecutionCreated"
  - "TradeCreated"
  - "TradeAllocated"
  - "ConfirmationGenerated"
  - "TradeAffirmed"
  - "SettlementObligationCreated"
  - "SettlementFailed"
  - "ExceptionOpened"
  - "ExceptionRepairApplied"
  - "SettlementRetried"
  - "SettlementCompleted"
  - "ScenarioRunCompleted"

expectedFinalStates:
  trade: "AFFIRMED"
  settlement: "SETTLED"
  exception: "CLOSED"
  scenarioRun: "COMPLETED"

invariants:
  - "Exception must open after settlement failure in this path."
  - "Exception cannot close before successful settlement retry."
  - "No direct settlement-complete transition from failed state without repair action."
  - "All scenario-driven events contain scenarioRunId/correlationId/causationId."

uiAssertions:
  - "Timeline clearly shows fail -> exception open -> repair -> retry -> settled chain."
  - "Exception workbench shows one opened and then resolved case."
  - "Scenario run detail shows seed=424243 and status=COMPLETED."

replayAssertions:
  - "Given seed=424243 and same preconditions, failure occurs at the same lifecycle step."
  - "Expected event order remains stable across replay."

idempotencyAssertions:
  - command: "OpenException"
    assertion: "Duplicate commandId does not create duplicate exception cases."
  - command: "ResolveException"
    assertion: "Duplicate commandId does not apply duplicate repair actions."
  - command: "RetrySettlement"
    assertion: "Duplicate commandId does not create duplicate retry transitions."
