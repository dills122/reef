schemaVersion: "1.0"
pathId: "P2_SETTLEMENT_BREAK_REPAIR"
name: "Settlement Cash-Leg Break and Repair"
businessGoal: "Prove deterministic trade -> obligation -> cash-leg break -> repair -> resolved lifecycle."
seed: 424243

preconditions:
  market:
    assetClass: "US_EQ"
    settlementCycle: "T+1"
    venueType: "DARK_POOL_SIM"
    matchingMode: "HIDDEN_MIDPOINT_CROSS"
  referenceData:
    instruments:
      - instrumentId: "XYZ"
        symbol: "XYZ"
    participants:
      - participantId: "BUY_SIDE_1"
      - participantId: "SELL_SIDE_1"
    accounts:
      - accountId: "BUY_SIDE_1_MAIN"
        participantId: "BUY_SIDE_1"
      - accountId: "SELL_SIDE_1_MAIN"
        participantId: "SELL_SIDE_1"
  policyProfiles:
    settlementFailureType: "CASH_LEG_FAILED"

runContext:
  clock:
    mode: "SIMULATED"
    timezone: "America/New_York"
  actorDefaults:
    initiatingActorType: "BOT"
    repairActorType: "USER"
  metadata:
    scenarioRunRequiredFields:
      - "scenarioRunId"
      - "seed"
      - "correlationId"
      - "causationId"

faultInjection:
  enabled: true
  faults:
    - faultId: "FAULT_SETTLEMENT_CASH_LEG_FAILED"
      triggerStepSequence: 6
      action: "FAIL_CASH_LEG"
      expectedFailureEvent: "CashLegFailed"
      expectedExceptionEvent: "ExceptionOpened"

steps:
  - sequence: 1
    command: "SubmitOrder"
    description: "Submit hidden buy order."
    payload:
      side: "BUY"
      instrumentId: "XYZ"
      quantity: 1000
      orderType: "LIMIT_HIDDEN"
      limitPrice: "MIDPOINT"
      accountId: "BUY_SIDE_1_MAIN"
  - sequence: 2
    command: "SubmitOrder"
    description: "Submit hidden sell order."
    payload:
      side: "SELL"
      instrumentId: "XYZ"
      quantity: 1000
      orderType: "LIMIT_HIDDEN"
      limitPrice: "MIDPOINT"
      accountId: "SELL_SIDE_1_MAIN"
  - sequence: 3
    command: "MatchOrders"
  - sequence: 4
    command: "CreateTrade"
  - sequence: 5
    command: "CreateSettlementObligation"
  - sequence: 6
    command: "AdvanceSettlement"
    description: "Fault injector forces cash-leg failure."
  - sequence: 7
    command: "OpenException"
  - sequence: 8
    command: "ResolveException"
    description: "Operator posts manual cash-leg repair."
    payload:
      repairAction: "POST_CASH_LEG_REPAIR"
  - sequence: 9
    command: "ResolveSettlement"
  - sequence: 10
    command: "CompleteScenarioRun"

expectedEvents:
  - "ScenarioRunStarted"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "OrderSubmitted"
  - "OrderAccepted"
  - "ExecutionCreated"
  - "TradeCreated"
  - "SettlementObligationCreated"
  - "CashLegFailed"
  - "ExceptionOpened"
  - "ExceptionRepairApplied"
  - "SettlementResolved"
  - "ScenarioRunCompleted"

expectedEventTimeline:
  anchor: "scenarioStart"
  events:
    - eventType: "ScenarioRunStarted"
      occurredAtOffsetSeconds: 0
    - eventType: "OrderSubmitted"
      occurredAtOffsetSeconds: 1
    - eventType: "OrderAccepted"
      occurredAtOffsetSeconds: 1
    - eventType: "OrderSubmitted"
      occurredAtOffsetSeconds: 2
    - eventType: "OrderAccepted"
      occurredAtOffsetSeconds: 2
    - eventType: "ExecutionCreated"
      occurredAtOffsetSeconds: 3
    - eventType: "TradeCreated"
      occurredAtOffsetSeconds: 3
    - eventType: "SettlementObligationCreated"
      occurredAtOffsetSeconds: 4
    - eventType: "CashLegFailed"
      occurredAtOffsetSeconds: 5
    - eventType: "ExceptionOpened"
      occurredAtOffsetSeconds: 5
    - eventType: "ExceptionRepairApplied"
      occurredAtOffsetSeconds: 6
    - eventType: "SettlementResolved"
      occurredAtOffsetSeconds: 7
    - eventType: "ScenarioRunCompleted"
      occurredAtOffsetSeconds: 8

expectedFinalStates:
  trade: "CREATED"
  settlement: "RESOLVED"
  exception: "RESOLVED"
  scenarioRun: "COMPLETED"

invariants:
  - "Exception must open after cash-leg failure in this path."
  - "Exception cannot resolve before manual repair is posted."
  - "No direct failed-to-resolved transition without repair action."
  - "All scenario-driven events contain scenarioRunId/correlationId/causationId."

uiAssertions:
  - "Timeline clearly shows trade -> obligation -> cash-leg break -> repair -> resolved chain."
  - "Exception view shows one opened and then resolved case."
  - "Scenario run detail shows seed=424243 and status=COMPLETED."

replayAssertions:
  - "Given seed=424243 and same preconditions, failure occurs at the same lifecycle step."
  - "Expected event order remains stable across replay."
  - "Given seed=424243 and same preconditions, expectedEventTimeline occurredAt offsets are identical and monotonic."

idempotencyAssertions:
  - command: "OpenException"
    assertion: "Duplicate commandId does not create duplicate exception cases."
  - command: "ResolveException"
    assertion: "Duplicate commandId does not apply duplicate repair actions."
  - command: "ResolveSettlement"
    assertion: "Duplicate commandId does not create duplicate resolved transitions."
