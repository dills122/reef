name: Admin UI Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'apps/arena-admin/**'
      - 'scripts/deploy/hetzner-core.mjs'
      - '.github/workflows/admin-ui-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: admin-ui-deploy
  cancel-in-progress: false

jobs:
  deploy-admin-ui:
    runs-on: ubuntu-latest
    environment:
      name: backbone-admin
      url: https://reef-arena-admin.shrimpworks.dev/
    env:
      REEF_ADMIN_DEPLOY_URL: ${{ vars.REEF_ADMIN_DEPLOY_URL || 'https://reef-arena-admin.shrimpworks.dev/admin/deploy/arena-admin' }}
      REEF_ADMIN_DEPLOY_AUDIENCE: ${{ vars.REEF_ADMIN_DEPLOY_AUDIENCE || 'reef-backbone-admin-deploy' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Build admin UI static assets
        run: |
          set -euo pipefail
          cd apps/arena-admin
          bun install --frozen-lockfile
          PUBLIC_ARENA_API_BASE_URL="" bun --bun run build

      - name: Package admin UI artifact
        run: |
          set -euo pipefail
          artifact="$RUNNER_TEMP/arena-admin.tar.gz"
          tar -czf "$artifact" -C apps/arena-admin/build .
          sha="$(sha256sum "$artifact" | awk '{print $1}')"
          echo "REEF_ADMIN_ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "REEF_ADMIN_ARTIFACT_SHA256=$sha" >> "$GITHUB_ENV"

      - name: Request deploy OIDC token
        run: |
          set -euo pipefail
          token_json="$(
            curl -fsS \
              -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              -H "Accept: application/json; api-version=2.0" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${REEF_ADMIN_DEPLOY_AUDIENCE}"
          )"
          token="$(printf '%s' "$token_json" | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => process.stdout.write(JSON.parse(input).value));')"
          test -n "$token"
          echo "::add-mask::$token"
          echo "REEF_ADMIN_DEPLOY_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Deploy admin UI artifact
        run: |
          set -euo pipefail
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer $REEF_ADMIN_DEPLOY_TOKEN" \
            -H "Content-Type: application/gzip" \
            -H "X-Reef-Artifact-Sha256: $REEF_ADMIN_ARTIFACT_SHA256" \
            -H "X-Reef-Git-Sha: $GITHUB_SHA" \
            -H "X-Reef-Github-Run-Id: $GITHUB_RUN_ID" \
            -H "X-Reef-Github-Run-Attempt: $GITHUB_RUN_ATTEMPT" \
            --data-binary "@$REEF_ADMIN_ARTIFACT" \
            "$REEF_ADMIN_DEPLOY_URL"
