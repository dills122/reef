name: Bot Submission Provision

# Runs hosted registry diff and OpenBao provisioning from trusted base-branch
# workflow code after the unprivileged Bot Submission PR workflow succeeds.

on:
  workflow_run:
    workflows:
      - Bot Submission
    types:
      - completed

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  provision:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != ''
    env:
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Resolve current pull request metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/reef-bot-submission-pr.json
          node -e '
            const fs = require("fs");
            const pr = JSON.parse(fs.readFileSync("/tmp/reef-bot-submission-pr.json", "utf8"));
            const values = {
              "head-branch": pr.head?.ref,
              "head-repository": pr.head?.repo?.full_name,
              "head-owner-login": pr.head?.repo?.owner?.login,
              "head-sha": pr.head?.sha,
              "submitter-github-id": pr.user?.id,
              "submitter-github-login": pr.user?.login,
            };
            for (const [key, value] of Object.entries(values)) {
              if (typeof value !== "string" && typeof value !== "number") throw new Error(`missing trusted PR metadata: ${key}`);
              const text = String(value);
              if (/\\r|\\n/.test(text)) throw new Error(`unsafe trusted PR metadata: ${key}`);
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${text}\\n`);
            }
          '
      - name: Classify trusted provisioning inputs
        id: classify
        env:
          HEAD_BRANCH: ${{ steps.metadata.outputs.head-branch }}
          HEAD_REPOSITORY: ${{ steps.metadata.outputs.head-repository }}
        run: |
          branch="$HEAD_BRANCH"
          case "$branch" in
            bots/add/*) flow="add" ;;
            bots/update/*) flow="update" ;;
            bots/remove/*) flow="remove" ;;
            *)
              {
                echo "is-bot=false"
                echo "trusted-bot=false"
                echo "classification=skip"
                echo "message=not a bot-submission branch"
              } >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          bot_name="${branch#bots/*/}"
          if [ "$HEAD_REPOSITORY" != "$GITHUB_REPOSITORY" ]; then
            {
              echo "is-bot=true"
              echo "trusted-bot=false"
              echo "classification=pending"
              echo "flow=$flow"
              echo "bot-name=$bot_name"
              echo "message=forked bot submission is pending invite review"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! node scripts/dev/bot-submission-registry-diff.mjs "$bot_name" --validate-only >/tmp/reef-bot-id-validation.log 2>&1; then
            {
              echo "is-bot=true"
              echo "trusted-bot=false"
              echo "classification=failure"
              echo "message<<EOF"
              cat /tmp/reef-bot-id-validation.log
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "is-bot=true"
            echo "trusted-bot=true"
            echo "classification=provision"
            echo "flow=$flow"
            echo "bot-name=$bot_name"
          } >> "$GITHUB_OUTPUT"
      - name: Record fork submission admission
        id: admission
        if: steps.classify.outputs.classification == 'pending' && github.event.workflow_run.conclusion == 'success'
        env:
          ARENA_ADMIN_API_URL: ${{ secrets.ARENA_ADMIN_API_URL }}
          ARENA_ADMIN_API_TOKEN: ${{ secrets.ARENA_ADMIN_API_TOKEN }}
          BOT_SUBMISSION_ADMISSION_MODE: real
          BOT_NAME: ${{ steps.classify.outputs.bot-name }}
          HEAD_REPOSITORY: ${{ steps.metadata.outputs.head-repository }}
          HEAD_OWNER_LOGIN: ${{ steps.metadata.outputs.head-owner-login }}
          HEAD_SHA: ${{ steps.metadata.outputs.head-sha }}
          SUBMITTER_GITHUB_ID: ${{ steps.metadata.outputs.submitter-github-id }}
          SUBMITTER_GITHUB_LOGIN: ${{ steps.metadata.outputs.submitter-github-login }}
        run: |
          result=$(node scripts/dev/bot-submission-record-admission.mjs)
          state=$(printf '%s' "$result" | node -e 'let raw=""; process.stdin.on("data", chunk => raw += chunk).on("end", () => { const state = JSON.parse(raw).admission?.state; if (!state) process.exit(1); process.stdout.write(state); })')
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Resolve non-bot branch provisioning status
        id: non-bot-status
        if: steps.classify.outputs.classification == 'skip'
        env:
          UPSTREAM_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "$UPSTREAM_CONCLUSION" = "success" ]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=Not a bot submission" >> "$GITHUB_OUTPUT"
          else
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=Bot Submission workflow did not pass" >> "$GITHUB_OUTPUT"
          fi
      - name: Mark non-bot branch provisioning status
        if: steps.classify.outputs.classification == 'skip'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ steps.metadata.outputs.head-sha }}
          STATUS_STATE: ${{ steps.non-bot-status.outputs.state }}
          STATUS_DESCRIPTION: ${{ steps.non-bot-status.outputs.description }}
          STATUS_TARGET_URL: ${{ env.STATUS_TARGET_URL }}
        run: node scripts/dev/bot-submission-commit-status.mjs
      - name: Fail after a non-bot upstream validation failure
        if: steps.classify.outputs.classification == 'skip' && github.event.workflow_run.conclusion != 'success'
        run: exit 1
      - name: Mark provisioning status pending
        if: steps.classify.outputs.classification != 'skip'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ steps.metadata.outputs.head-sha }}
          STATUS_STATE: pending
          STATUS_DESCRIPTION: Bot submission provisioning is queued
          STATUS_TARGET_URL: ${{ env.STATUS_TARGET_URL }}
        run: node scripts/dev/bot-submission-commit-status.mjs
      - name: Mark upstream bot submission failure
        if: steps.classify.outputs.classification != 'skip' && github.event.workflow_run.conclusion != 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ steps.metadata.outputs.head-sha }}
          STATUS_STATE: failure
          STATUS_DESCRIPTION: Bot Submission workflow did not pass
          STATUS_TARGET_URL: ${{ env.STATUS_TARGET_URL }}
        run: |
          node scripts/dev/bot-submission-commit-status.mjs
          exit 1
      - name: Mark invite review pending
        if: steps.classify.outputs.classification == 'pending' && steps.admission.outputs.state != 'invite_approved'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ steps.metadata.outputs.head-sha }}
          STATUS_STATE: pending
          STATUS_DESCRIPTION: Fork submission is pending invite review
          STATUS_TARGET_URL: ${{ env.STATUS_TARGET_URL }}
        run: node scripts/dev/bot-submission-commit-status.mjs
      - name: Registry diff (new bot vs existing bot)
        id: registry-diff
        if: (steps.classify.outputs.trusted-bot == 'true' || steps.admission.outputs.state == 'invite_approved') && steps.classify.outputs.flow != 'remove'
        env:
          ARENA_ADMIN_API_URL: ${{ secrets.ARENA_ADMIN_API_URL }}
          ARENA_ADMIN_API_TOKEN: ${{ secrets.ARENA_ADMIN_API_TOKEN }}
          BOT_NAME: ${{ steps.classify.outputs.bot-name }}
        run: node scripts/dev/bot-submission-registry-diff.mjs "$BOT_NAME"
      - name: OpenBao provisioning
        id: openbao-provision
        if: steps.classify.outputs.trusted-bot == 'true' || steps.admission.outputs.state == 'invite_approved'
        continue-on-error: true
        env:
          ARENA_ADMIN_API_URL: ${{ secrets.ARENA_ADMIN_API_URL }}
          ARENA_ADMIN_API_TOKEN: ${{ secrets.ARENA_ADMIN_API_TOKEN }}
          BOT_SUBMISSION_OPENBAO_MODE: real
          BOT_NAME: ${{ steps.classify.outputs.bot-name }}
          REQUESTED_FLOW: ${{ steps.classify.outputs.flow }}
          REGISTRY_FLOW: ${{ steps.registry-diff.outputs.flow }}
          SUBMITTER_IDENTITY: ${{ steps.metadata.outputs.submitter-github-login }}
        run: |
          if [ "$REQUESTED_FLOW" = "remove" ]; then
            provision_flow="remove"
          else
            provision_flow="$REGISTRY_FLOW"
          fi
          slice_path="secret/bots/${SUBMITTER_IDENTITY}/${BOT_NAME}"
          {
            echo "flow=$provision_flow"
            echo "slice-path=$slice_path"
          } >> "$GITHUB_OUTPUT"
          set +e
          output=$(node scripts/dev/bot-submission-provision-openbao.mjs \
            "$BOT_NAME" \
            "$provision_flow" \
            "$SUBMITTER_IDENTITY" 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            result="success"
          else
            result="failure"
          fi
          message=$(printf '%s\n' "$output" | tail -n 1)
          {
            echo "result=$result"
            echo "exit-code=$status"
            echo "message<<EOF"
            printf '%s\n' "$message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Comment OpenBao provisioning result
        if: always() && steps.openbao-provision.outputs.result != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_ID: ${{ steps.classify.outputs.bot-name }}
          PROVISION_FLOW: ${{ steps.openbao-provision.outputs.flow }}
          PROVISION_RESULT: ${{ steps.openbao-provision.outputs.result }}
          PROVISION_MESSAGE: ${{ steps.openbao-provision.outputs.message }}
          OPENBAO_SLICE_PATH: ${{ steps.openbao-provision.outputs['slice-path'] }}
        run: node scripts/dev/bot-submission-pr-comment.mjs
      - name: Mark provisioning status success
        if: steps.openbao-provision.outputs['exit-code'] == '0'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ steps.metadata.outputs.head-sha }}
          STATUS_STATE: success
          STATUS_DESCRIPTION: OpenBao provisioning completed
          STATUS_TARGET_URL: ${{ env.STATUS_TARGET_URL }}
        run: node scripts/dev/bot-submission-commit-status.mjs
      - name: Mark provisioning status failure
        if: steps.openbao-provision.outputs['exit-code'] != '' && steps.openbao-provision.outputs['exit-code'] != '0'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ steps.metadata.outputs.head-sha }}
          STATUS_STATE: failure
          STATUS_DESCRIPTION: OpenBao provisioning failed
          STATUS_TARGET_URL: ${{ env.STATUS_TARGET_URL }}
        run: node scripts/dev/bot-submission-commit-status.mjs
      - name: Fail on OpenBao provisioning failure
        if: steps.openbao-provision.outputs['exit-code'] != '' && steps.openbao-provision.outputs['exit-code'] != '0'
        run: exit 1
