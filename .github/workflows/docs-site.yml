name: Docs Site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "apps/docs-site/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/docs-site/package-lock.json

      - name: Install docs dependencies
        working-directory: apps/docs-site
        run: npm ci --include=optional

      - name: Build docs site
        working-directory: apps/docs-site
        env:
          DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          DOCS_SITE_BASE: ${{ vars.DOCS_SITE_BASE || format('/{0}', github.event.repository.name) }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload docs site
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs-site/dist

      - name: Deploy docs site
        id: deployment
        uses: actions/deploy-pages@v5
