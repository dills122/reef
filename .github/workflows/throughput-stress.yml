name: Runtime Stress Sanity

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Stress duration per run.
        required: false
        default: 90s
      rates:
        description: Comma-separated target request rates.
        required: false
        default: 1000,2500
      include_db:
        description: Run the db-backed profile after the no-persistence profile.
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '17 8 * * 1,3,5'

permissions:
  contents: read

concurrency:
  group: throughput-stress-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-nodb:
    name: No-persistence runtime sanity stress
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      JS_RUNTIME: node
      REEF_COMPOSE_FILES: compose.base.yml,compose.local.yml
      DEV_STRESS_DURATION: ${{ inputs.duration || '90s' }}
      DEV_STRESS_RATES: ${{ inputs.rates || '1000,2500' }}
      DEV_STRESS_SWEEP_WORKERS: '256'
      DEV_STRESS_RATE_SCHEDULE: precise
      DEV_STRESS_RATE_QUEUE_DEPTH: '200000'
      DEV_STRESS_MIN_SUCCESS_RATE_PCT: '95'
      DEV_STRESS_ARTIFACT_DIR: throughput-artifacts/runtime-nodb
      DEV_STRESS_REPORT_OUT: throughput-artifacts/runtime-nodb/runtime-nodb.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/simulator/go.mod
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run no-persistence stress iteration 1
        env:
          DEV_STRESS_RUN_KIND: scheduled-throughput
          DEV_STRESS_SCENARIO_ID: runtime-nodb:ci:iteration-1
          DEV_STRESS_REPORT_OUT: throughput-artifacts/runtime-nodb/runtime-nodb-iteration-1.json
        run: JS_RUNTIME=node make dev-stress-runtime-nodb
      - name: Run no-persistence stress iteration 2
        env:
          DEV_STRESS_RUN_KIND: scheduled-throughput
          DEV_STRESS_SCENARIO_ID: runtime-nodb:ci:iteration-2
          DEV_STRESS_REPORT_OUT: throughput-artifacts/runtime-nodb/runtime-nodb-iteration-2.json
        run: JS_RUNTIME=node make dev-stress-runtime-nodb
      - name: Publish no-persistence KPI summary
        if: always()
        run: |
          echo "## No-persistence runtime throughput" >> "$GITHUB_STEP_SUMMARY"
          find throughput-artifacts/runtime-nodb -name '*-kpi.md' -print -exec cat {} \; >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload no-persistence throughput artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: throughput-runtime-nodb
          path: throughput-artifacts/runtime-nodb
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f compose.base.yml -f compose.local.yml logs
      - name: Stop stack
        if: always()
        run: docker compose -f compose.base.yml -f compose.local.yml down --volumes --remove-orphans

  runtime-db:
    name: DB-backed runtime sanity stress
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'schedule' || inputs.include_db == 'true' }}
    env:
      JS_RUNTIME: node
      REEF_COMPOSE_FILES: compose.base.yml,compose.local.yml
      DEV_STRESS_DURATION: ${{ inputs.duration || '90s' }}
      DEV_STRESS_RATES: ${{ inputs.rates || '1000,2500' }}
      DEV_STRESS_WORKERS: '64'
      DEV_STRESS_RATE_SCHEDULE: precise
      DEV_STRESS_RATE_QUEUE_DEPTH: '200000'
      DEV_STRESS_MIN_SUCCESS_RATE_PCT: '90'
      DEV_STRESS_CAPTURE_DB_DIAGNOSTICS: '1'
      DEV_STRESS_ARTIFACT_DIR: throughput-artifacts/runtime-db
      DEV_STRESS_REPORT_OUT: throughput-artifacts/runtime-db/runtime-db.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/simulator/go.mod
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run db-backed stress iteration 1
        env:
          DEV_STRESS_RUN_KIND: scheduled-throughput
          DEV_STRESS_SCENARIO_ID: runtime-db:ci:iteration-1
          DEV_STRESS_REPORT_OUT: throughput-artifacts/runtime-db/runtime-db-iteration-1.json
        run: JS_RUNTIME=node make dev-stress
      - name: Run db-backed stress iteration 2
        env:
          DEV_STRESS_RUN_KIND: scheduled-throughput
          DEV_STRESS_SCENARIO_ID: runtime-db:ci:iteration-2
          DEV_STRESS_REPORT_OUT: throughput-artifacts/runtime-db/runtime-db-iteration-2.json
        run: JS_RUNTIME=node make dev-stress
      - name: Publish db-backed KPI summary
        if: always()
        run: |
          echo "## DB-backed runtime throughput" >> "$GITHUB_STEP_SUMMARY"
          find throughput-artifacts/runtime-db -name '*-kpi.md' -print -exec cat {} \; >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload db-backed throughput artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: throughput-runtime-db
          path: throughput-artifacts/runtime-db
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f compose.base.yml -f compose.local.yml logs
      - name: Stop stack
        if: always()
        run: docker compose -f compose.base.yml -f compose.local.yml down --volumes --remove-orphans
