name: Bot Submission

# Implements the pipeline agreed in docs/BOT_ARENA_PLAN.md's
# "Resolved Slice: Bot Submission Workflow And OpenBao Provisioning".
#
# Branch convention (routing only, not a trust boundary):
#   bots/add/<bot-name>    - new bot, provisions a new OpenBao identity+slice if needed
#   bots/update/<bot-name> - new ArenaBotVersion for an existing bot, reuses existing slice
#   bots/remove/<bot-name> - archives the bot and revokes/deletes its OpenBao slice
#
# Manifest convention: bots/<bot-name>/bot.json (schema: see
# scripts/dev/bot-submission-validate.mjs), alongside the bot's TypeScript entry
# file, added/changed in the same PR.
#
# Stage 4 (registry-diff + OpenBao provisioning) calls the real, always-on
# hosted platform-runtime admin API over HTTPS (ARENA_ADMIN_API_URL secret) -
# it does NOT spin up an ephemeral `make dev-up` stack like stages 1-3 do.
# A fresh per-run stack has an empty registry DB and a throwaway OpenBao
# container, so a registry diff or secret provisioning against it would be
# meaningless (every bot would look "new"; nothing provisioned would persist).
# CI stays a plain HTTP client here - no JVM/Gradle runs in this workflow at
# all; the Kotlin OpenBao client code runs only on the always-on server.
#
# The admin API is loopback-only by default (SSH-tunnel access per
# infra/hetzner-core/server/README.md). GitHub Actions reaches only the
# narrowly-scoped Caddy gateway routes for registry lookup and
# /admin/v1/arena/bots/openbao-provision, using ARENA_ADMIN_API_TOKEN plus
# GitHub Actions OIDC. The script never talks to OpenBao directly.

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read
  id-token: write

jobs:
  detect-flow:
    runs-on: ubuntu-latest
    outputs:
      flow: ${{ steps.parse.outputs.flow }}
      bot-name: ${{ steps.parse.outputs.bot-name }}
    steps:
      - name: Parse branch convention
        id: parse
        run: |
          branch="${{ github.head_ref }}"
          case "$branch" in
            bots/add/*) flow="add" ;;
            bots/update/*) flow="update" ;;
            bots/remove/*) flow="remove" ;;
            *)
              echo "not a bot-submission branch (bots/add|update|remove/<name>), skipping: $branch"
              flow="skip"
              ;;
          esac
          bot_name="${branch#bots/*/}"
          echo "flow=$flow" >> "$GITHUB_OUTPUT"
          echo "bot-name=$bot_name" >> "$GITHUB_OUTPUT"

  # Stage 1: bot validity check (schema, manifest, required metadata incl. email).
  validate-manifest:
    needs: detect-flow
    runs-on: ubuntu-latest
    if: needs.detect-flow.outputs.flow != 'remove' && needs.detect-flow.outputs.flow != 'skip'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate bot manifest
        run: |
          node scripts/dev/bot-submission-validate.mjs \
            "bots/${{ needs.detect-flow.outputs.bot-name }}/bot.json"

  # Stages 2+3: security/static analysis (approved-import scan) and sandboxed
  # test run both happen inside bot-sdk-test-bot.mjs's existing SES-based gate
  # (docs/BOT_SDK_AUTHOR_GUIDE.md:156) - it is one script, not two separate
  # tools, and exits nonzero / marks do_not_merge on either failure.
  scan-and-sandbox-test:
    needs: [detect-flow, validate-manifest]
    runs-on: ubuntu-latest
    if: needs.detect-flow.outputs.flow != 'remove' && needs.detect-flow.outputs.flow != 'skip'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Security scan + sandboxed test run
        run: |
          bun scripts/dev/bot-sdk-test-bot.mjs \
            "bots/${{ needs.detect-flow.outputs.bot-name }}/index.ts"

  # Stage 4: registry diff (add vs update, by registry state not branch name)
  # plus OpenBao provisioning, against the real hosted admin API. Only
  # reached if 1-3 pass. No local stack is started here (see header note).
  registry-diff-and-provision:
    needs: [detect-flow, validate-manifest, scan-and-sandbox-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    # `always()` + explicit check lets bots/remove skip the 1-3 gate (no bot
    # code to scan/test) while still requiring validate/scan to have passed
    # for add/update flows.
    if: |
      always() &&
      needs.detect-flow.result == 'success' &&
      needs.detect-flow.outputs.flow != 'skip' &&
      (needs.detect-flow.outputs.flow == 'remove' ||
        (needs.validate-manifest.result == 'success' && needs.scan-and-sandbox-test.result == 'success'))
    env:
      ARENA_ADMIN_API_URL: ${{ secrets.ARENA_ADMIN_API_URL }}
      ARENA_ADMIN_API_TOKEN: ${{ secrets.ARENA_ADMIN_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Registry diff (new bot vs existing bot)
        id: registry-diff
        if: needs.detect-flow.outputs.flow != 'remove'
        run: node scripts/dev/bot-submission-registry-diff.mjs "${{ needs.detect-flow.outputs.bot-name }}"
      - name: OpenBao provisioning
        id: openbao-provision
        continue-on-error: true
        env:
          BOT_SUBMISSION_OPENBAO_MODE: real
        run: |
          flow="${{ needs.detect-flow.outputs.flow }}"
          if [ "$flow" = "remove" ]; then
            provision_flow="remove"
          else
            provision_flow="${{ steps.registry-diff.outputs.flow }}"
          fi
          slice_path="secret/bots/${{ github.actor }}/${{ needs.detect-flow.outputs.bot-name }}"
          echo "flow=$provision_flow" >> "$GITHUB_OUTPUT"
          echo "slice-path=$slice_path" >> "$GITHUB_OUTPUT"
          set +e
          output=$(node scripts/dev/bot-submission-provision-openbao.mjs \
            "${{ needs.detect-flow.outputs.bot-name }}" \
            "$provision_flow" \
            "${{ github.actor }}" 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            result="success"
          else
            result="failure"
          fi
          message=$(printf '%s\n' "$output" | tail -n 1)
          {
            echo "result=$result"
            echo "exit-code=$status"
            echo "message<<EOF"
            printf '%s\n' "$message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Comment OpenBao provisioning result
        if: always() && steps.openbao-provision.outputs.result != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BOT_ID: ${{ needs.detect-flow.outputs.bot-name }}
          SUBMITTER_IDENTITY: ${{ github.actor }}
          PROVISION_FLOW: ${{ steps.openbao-provision.outputs.flow }}
          PROVISION_RESULT: ${{ steps.openbao-provision.outputs.result }}
          PROVISION_MESSAGE: ${{ steps.openbao-provision.outputs.message }}
          OPENBAO_SLICE_PATH: ${{ steps.openbao-provision.outputs['slice-path'] }}
        run: node scripts/dev/bot-submission-pr-comment.mjs
      - name: Fail on OpenBao provisioning failure
        if: steps.openbao-provision.outputs['exit-code'] != '0'
        run: exit 1

  # Off-convention PRs skip the pipeline above entirely (see detect-flow).
  # This job catches the case that would otherwise slip through silently:
  # a bots/** file changed on a branch that isn't bots/add|update|remove/<name>,
  # so it never got schema-validated, scanned, or sandbox-tested.
  warn-unconventional-bot-changes:
    needs: detect-flow
    runs-on: ubuntu-latest
    if: needs.detect-flow.outputs.flow == 'skip'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn if bot files changed off-convention
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head" -- 'bots/**')
          if [ -n "$changed" ]; then
            echo "::warning::Bot files changed on branch '${{ github.head_ref }}', which doesn't match bots/add|update|remove/<bot-name>. This PR skipped manifest validation, security scan, and sandbox test. Rename the branch to run the bot-submission pipeline."
            echo "$changed" | while read -r f; do
              echo "::warning file=$f::Changed on non-bot-submission branch; not validated/scanned/tested."
            done
          fi
