name: Bot Submission

# Implements the pipeline agreed in docs/BOT_ARENA_PLAN.md's
# "Resolved Slice: Bot Submission Workflow And OpenBao Provisioning".
#
# Branch convention (routing only, not a trust boundary):
#   bots/add/<bot-name>    - new bot, provisions a new OpenBao identity+slice if needed
#   bots/update/<bot-name> - new ArenaBotVersion for an existing bot, reuses existing slice
#   bots/remove/<bot-name> - archives the bot and revokes/deletes its OpenBao slice
#
# Manifest convention: bots/<bot-name>/bot.json (schema: see
# scripts/dev/bot-submission-validate.mjs), alongside the bot's TypeScript entry
# file, added/changed in the same PR.
#
# Stage 4 (registry-diff + OpenBao provisioning) calls the real, always-on
# hosted platform-runtime admin API over HTTPS (ARENA_ADMIN_API_URL secret) -
# it does NOT spin up an ephemeral `make dev-up` stack like stages 1-3 do.
# A fresh per-run stack has an empty registry DB and a throwaway OpenBao
# container, so a registry diff or secret provisioning against it would be
# meaningless (every bot would look "new"; nothing provisioned would persist).
# CI stays a plain HTTP client here - no JVM/Gradle runs in this workflow at
# all; the Kotlin OpenBao client code runs only on the always-on server.
#
# The admin API is loopback-only by default (SSH-tunnel access per
# infra/hetzner-core/server/README.md). Reaching it from GitHub Actions
# requires exposing a narrowly-scoped route through the existing Caddy reverse
# proxy (bearer-token-gated, e.g. just
# /internal/admin/arena/bots/openbao-provision and the registry read route -
# not the full admin surface) rather than opening loopback broadly. That Caddy
# route plus the server-side OpenBao client (a new auth/jwt backend alongside
# the existing AppRole backend - see docs/BOT_ARENA_PLAN.md) are still
# outstanding; this workflow calls a dry-run stub
# (scripts/dev/bot-submission-provision-openbao.mjs) until they exist.

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read
  id-token: write # reserved for the future GitHub OIDC -> OpenBao JWT auth exchange

jobs:
  detect-flow:
    runs-on: ubuntu-latest
    outputs:
      flow: ${{ steps.parse.outputs.flow }}
      bot-name: ${{ steps.parse.outputs.bot-name }}
    steps:
      - name: Parse branch convention
        id: parse
        run: |
          branch="${{ github.head_ref }}"
          case "$branch" in
            bots/add/*) flow="add" ;;
            bots/update/*) flow="update" ;;
            bots/remove/*) flow="remove" ;;
            *)
              echo "not a bot-submission branch (bots/add|update|remove/<name>): $branch" >&2
              exit 1
              ;;
          esac
          bot_name="${branch#bots/*/}"
          echo "flow=$flow" >> "$GITHUB_OUTPUT"
          echo "bot-name=$bot_name" >> "$GITHUB_OUTPUT"

  # Stage 1: bot validity check (schema, manifest, required metadata incl. email).
  validate-manifest:
    needs: detect-flow
    runs-on: ubuntu-latest
    if: needs.detect-flow.outputs.flow != 'remove'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate bot manifest
        run: |
          node scripts/dev/bot-submission-validate.mjs \
            "bots/${{ needs.detect-flow.outputs.bot-name }}/bot.json"

  # Stages 2+3: security/static analysis (approved-import scan) and sandboxed
  # test run both happen inside bot-sdk-test-bot.mjs's existing SES-based gate
  # (docs/BOT_SDK_AUTHOR_GUIDE.md:156) - it is one script, not two separate
  # tools, and exits nonzero / marks do_not_merge on either failure.
  scan-and-sandbox-test:
    needs: [detect-flow, validate-manifest]
    runs-on: ubuntu-latest
    if: needs.detect-flow.outputs.flow != 'remove'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Security scan + sandboxed test run
        run: |
          node scripts/dev/bot-sdk-test-bot.mjs \
            "bots/${{ needs.detect-flow.outputs.bot-name }}/index.ts"

  # Stage 4: registry diff (add vs update, by registry state not branch name)
  # plus OpenBao provisioning, against the real hosted admin API. Only
  # reached if 1-3 pass. No local stack is started here (see header note).
  registry-diff-and-provision:
    needs: [detect-flow, validate-manifest, scan-and-sandbox-test]
    runs-on: ubuntu-latest
    # `always()` + explicit check lets bots/remove skip the 1-3 gate (no bot
    # code to scan/test) while still requiring validate/scan to have passed
    # for add/update flows.
    if: |
      always() &&
      needs.detect-flow.result == 'success' &&
      (needs.detect-flow.outputs.flow == 'remove' ||
        (needs.validate-manifest.result == 'success' && needs.scan-and-sandbox-test.result == 'success'))
    env:
      ARENA_ADMIN_API_URL: ${{ secrets.ARENA_ADMIN_API_URL }}
      ARENA_ADMIN_API_TOKEN: ${{ secrets.ARENA_ADMIN_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Registry diff (new bot vs existing bot)
        id: registry-diff
        if: needs.detect-flow.outputs.flow != 'remove'
        run: node scripts/dev/bot-submission-registry-diff.mjs "${{ needs.detect-flow.outputs.bot-name }}"
      - name: OpenBao provisioning (dry-run stub - see script header)
        env:
          BOT_SUBMISSION_OPENBAO_DRY_RUN: '1'
        run: |
          flow="${{ needs.detect-flow.outputs.flow }}"
          if [ "$flow" = "remove" ]; then
            provision_flow="remove"
          else
            provision_flow="${{ steps.registry-diff.outputs.flow }}"
          fi
          node scripts/dev/bot-submission-provision-openbao.mjs \
            "${{ needs.detect-flow.outputs.bot-name }}" \
            "$provision_flow" \
            "${{ github.actor }}"
