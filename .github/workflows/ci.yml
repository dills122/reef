name: CI

on:
  push:
    branches:
      - master
      - main
      - 'codex/**'
  pull_request:

jobs:
  proto-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Proto additive compatibility check
        run: ./scripts/check-proto-additive.sh

  go-matching-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/matching-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/matching-engine/go.mod
      - name: Check gofmt
        run: test -z "$(find . -name '*.go' -print | xargs gofmt -l)"
      - name: Run Go tests
        run: go test ./...
      - name: Run matching-engine benchmark guardrail
        working-directory: .
        run: ./scripts/ci/check-matching-bench.sh

  go-simulator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/simulator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/simulator/go.mod
      - name: Check gofmt
        run: test -z "$(find . -name '*.go' -print | xargs gofmt -l)"
      - name: Run simulator Go tests
        run: go test ./...

  kotlin-platform-runtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/platform-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Run Kotlin tests
        run: ./gradlew --no-daemon test
      - name: Run platform-runtime performance guardrail
        working-directory: .
        run: ./scripts/ci/check-runtime-bench.sh

  postgres-schema-placement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate dev migration scripts
        run: node --test scripts/dev/lib/dev-stack.test.mjs scripts/dev/db/migrate.test.mjs
      - name: Start Postgres
        run: docker compose -f docker-compose.yml up -d postgres --wait --wait-timeout 120
      - name: Apply migrations
        run: JS_RUNTIME=node make dev-db-migrate
      - name: Run schema placement integration test
        working-directory: services/platform-runtime
        env:
          RUNTIME_POSTGRES_JDBC_URL_TEST: jdbc:postgresql://localhost:5432/reef
          RUNTIME_POSTGRES_USER_TEST: reef
          RUNTIME_POSTGRES_PASSWORD_TEST: reef
        run: ./gradlew --no-daemon test --tests com.reef.platform.infrastructure.persistence.PostgresSchemaMigrationIntegrationTest
      - name: Dump Postgres logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs postgres
      - name: Stop Postgres
        if: always()
        run: docker compose -f docker-compose.yml down --volumes --remove-orphans
