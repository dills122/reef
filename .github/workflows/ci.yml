name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  dependency-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Check shared dependency and toolchain alignment
        run: make check-dependency-alignment

  proto-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Proto additive compatibility check
        run: ./scripts/check-proto-additive.sh

  go-matching-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/matching-engine
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/matching-engine/go.mod
      - name: Verify Go module files are tidy
        run: go mod tidy -diff
      - name: Check gofmt
        run: test -z "$(find . -name '*.go' -print | xargs gofmt -l)"
      - name: Run Go tests with coverage
        working-directory: .
        run: ./scripts/ci/go-coverage.sh services/matching-engine matching-engine coverage/matching-engine 76 "cmd/matching-engine|pb/contracts/proto"
      - name: Add coverage summary
        working-directory: .
        run: cat coverage/matching-engine/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload matching-engine coverage
        uses: actions/upload-artifact@v7
        with:
          name: matching-engine-coverage
          path: coverage/matching-engine
      - name: Run matching-engine benchmark guardrail
        working-directory: .
        run: ./scripts/ci/check-matching-bench.sh

  go-simulator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/simulator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/simulator/go.mod
      - name: Verify Go module files are tidy
        run: go mod tidy -diff
      - name: Check gofmt
        run: test -z "$(find . -name '*.go' -print | xargs gofmt -l)"
      - name: Run simulator Go tests with coverage
        working-directory: .
        run: ./scripts/ci/go-coverage.sh services/simulator simulator coverage/simulator 71
      - name: Add coverage summary
        working-directory: .
        run: cat coverage/simulator/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload simulator coverage
        uses: actions/upload-artifact@v7
        with:
          name: simulator-coverage
          path: coverage/simulator

  kotlin-platform-runtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/platform-runtime
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: Run Kotlin tests with coverage
        run: ./gradlew --no-daemon test jacocoTestReport jacocoTestCoverageVerification
      - name: Add coverage summary
        run: |
          csv="build/reports/jacoco/test/jacocoTestReport.csv"
          awk -F, '
            NR > 1 { missed += $4; covered += $5 }
            END {
              total = missed + covered
              pct = total == 0 ? 0 : covered * 100 / total
              print "## platform-runtime coverage"
              print ""
              print "| Module | Instruction coverage |"
              print "| --- | ---: |"
              printf("| services/platform-runtime | %.1f%% |\n", pct)
            }
          ' "$csv" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload platform-runtime coverage
        uses: actions/upload-artifact@v7
        with:
          name: platform-runtime-coverage
          path: |
            services/platform-runtime/build/reports/jacoco/test
            services/platform-runtime/build/test-results/test
      - name: Run platform-runtime performance guardrail
        working-directory: .
        run: ./scripts/ci/check-runtime-bench.sh

  kotlin-stock-data:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/stock-data
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: Run stock-data tests with coverage
        run: ./gradlew --no-daemon test jacocoTestReport jacocoTestCoverageVerification
      - name: Add coverage summary
        run: |
          csv="build/reports/jacoco/test/jacocoTestReport.csv"
          awk -F, '
            NR > 1 { missed += $4; covered += $5 }
            END {
              total = missed + covered
              pct = total == 0 ? 0 : covered * 100 / total
              print "## stock-data coverage"
              print ""
              print "| Module | Instruction coverage |"
              print "| --- | ---: |"
              printf("| services/stock-data | %.1f%% |\n", pct)
            }
          ' "$csv" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload stock-data coverage
        uses: actions/upload-artifact@v7
        with:
          name: stock-data-coverage
          path: |
            services/stock-data/build/reports/jacoco/test
            services/stock-data/build/test-results/test

  reef-arena-separation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Verify Reef core boundary and tests
        run: make test-reef-core
      - name: Verify Arena control-plane tests
        run: make test-arena-control-plane
      - name: Add Arena control-plane coverage summary
        run: |
          csv="services/arena-control-plane/build/reports/jacoco/test/jacocoTestReport.csv"
          awk -F, '
            NR > 1 { missed += $4; covered += $5 }
            END {
              total = missed + covered
              pct = total == 0 ? 0 : covered * 100 / total
              print "## arena-control-plane coverage"
              print ""
              print "| Module | Instruction coverage |"
              print "| --- | ---: |"
              printf("| services/arena-control-plane | %.1f%% |\n", pct)
            }
          ' "$csv" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Arena control-plane coverage
        uses: actions/upload-artifact@v7
        with:
          name: arena-control-plane-coverage
          path: |
            services/arena-control-plane/build/reports/jacoco/test
            services/arena-control-plane/build/test-results/test
      - name: Validate Reef Compose configuration
        run: make dev-compose-config ARGS='--services'
      - name: Validate Arena overlay Compose configuration
        run: DEV_COMPOSE_FILES='compose.base.yml,compose.local.yml,compose.arena.yml' make dev-compose-config ARGS='--services'

  node-dev-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Check script surface
        run: node scripts/dev/script-surface-check.mjs
      - name: Run Node dev-tooling tests with coverage
        env:
          NODE_V8_COVERAGE: coverage/node-dev-tooling/v8
        run: |
          set -o pipefail
          mkdir -p coverage/node-dev-tooling/v8
          node --test --experimental-test-coverage \
            scripts/dev/lib/dev-stack.test.mjs \
            scripts/dev/lib/dev-profiles.test.mjs \
            scripts/dev/db/migrate.test.mjs \
            scripts/dev/command-log-integrity-check.test.mjs \
            scripts/dev/command-log-pin.test.mjs \
            scripts/dev/command-log-archive.test.mjs \
            scripts/dev/command-log-archive-partitions.test.mjs \
            scripts/dev/command-log-prune.test.mjs \
            scripts/dev/bot-submission-register-merged.test.mjs \
            scripts/dev/export-simulation-run.test.mjs \
            scripts/dev/deploy-receiver.test.mjs \
            scripts/dev/analyze-arena-actor-diagnostics.test.mjs \
            scripts/dev/arena-score-breakdown.test.mjs \
            scripts/dev/compare-arena-score-v1-proof.test.mjs \
            scripts/dev/compare-arena-scoring-calibration.test.mjs \
            scripts/dev/run-arena-actor-calibration-matrix.test.mjs \
            scripts/dev/run-arena-scoring-calibration-matrix.test.mjs \
            scripts/dev/projection-replay-proof.test.mjs \
            scripts/dev/stream-profile-guard.test.mjs | tee coverage/node-dev-tooling/test-output.txt
      - name: Add coverage summary
        run: |
          {
            echo "## node dev-tooling coverage"
            echo
            echo '```text'
            tail -n 40 coverage/node-dev-tooling/test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Node dev-tooling coverage
        uses: actions/upload-artifact@v7
        with:
          name: node-dev-tooling-coverage
          path: coverage/node-dev-tooling

  docs-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs-site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/docs-site/package-lock.json
      - name: Install docs dependencies from lockfile
        run: npm ci --include=optional
      - name: Typecheck docs site
        run: npm run typecheck
      - name: Build docs site
        run: npm run build

  bot-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run bot SDK typecheck and test suite
        run: make test-bot-sdk
      - name: Run hosted bot container isolation gate
        run: |
          bun scripts/dev/bot-sdk-test-bot.mjs \
            packages/bot-sdk/examples/technical-indicator-strategy-bot.ts \
            packages/bot-sdk/fixtures/aapl-technical-indicator.json \
            --summary-only \
            --isolation=container \
            --wall-timeout-ms=15000

  arena-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/arena-admin
    env:
      PUBLIC_ARENA_API_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run check
      - name: Build static site
        run: bun --bun run build

  scenario-replay:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]'
    timeout-minutes: 25
    env:
      JS_RUNTIME: node
      EXTERNAL_API_COMMAND_PROCESSING_MODE: sync-result
      EXTERNAL_API_COMMAND_LOG_MODE: disabled
      EXTERNAL_API_COMMAND_ASYNC_WORKER_ENABLED: 'false'
      STREAM_ACK_WORKER_ENABLED: 'false'
      STREAM_ACK_PROJECTOR_ENABLED: 'false'
      # Replay seeding reaches platform-runtime through Docker networking, not loopback.
      PLATFORM_INTERNAL_HTTP_MODE: enabled
      ADMIN_API_TOKEN: local-admin
      DEV_REPLAY_ARTIFACT_DIR: replay-artifacts/persona-session
      DEV_REPLAY_DURATION: 20s
      DEV_REPLAY_WORKERS: '8'
      DEV_REPLAY_RATE: '120'
      DEV_REPLAY_TRACE_CHECK_LIMIT: '100'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/simulator/go.mod
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - uses: gradle/actions/setup-gradle@v6
      - name: Start replay stack
        run: JS_RUNTIME=node make dev-up
      - name: Run deterministic replay pack
        run: JS_RUNTIME=node make dev-replay
      - name: Add replay summary
        if: always()
        run: |
          echo "## deterministic replay" >> "$GITHUB_STEP_SUMMARY"
          find replay-artifacts/persona-session -name '*.check.json' -print -exec cat {} \; >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload replay artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deterministic-replay-artifacts
          path: replay-artifacts/persona-session
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f compose.base.yml -f compose.local.yml logs
      - name: Stop stack
        if: always()
        run: docker compose -f compose.base.yml -f compose.local.yml down --volumes --remove-orphans

  container-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: matching-engine
            context: services/matching-engine
            dockerfile: services/matching-engine/Dockerfile
          - name: platform-runtime
            context: services/platform-runtime
            dockerfile: services/platform-runtime/Dockerfile
          - name: arena-platform-runtime
            context: .
            dockerfile: services/arena-control-plane/Dockerfile
          - name: stock-data
            context: services/stock-data
            dockerfile: services/stock-data/Dockerfile
          - name: simulator
            context: services/simulator
            dockerfile: services/simulator/Dockerfile
          - name: deploy-receiver
            context: infra/hetzner-core/server/deploy-receiver
            dockerfile: infra/hetzner-core/server/deploy-receiver/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - name: Build ${{ matrix.name }} image
        run: docker build -f "${{ matrix.dockerfile }}" -t "reef/${{ matrix.name }}:ci" "${{ matrix.context }}"

  infrastructure-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2
      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive infra
      - name: Initialize and validate DigitalOcean benchmark configuration
        run: tofu -chdir=infra/do-benchmark init -backend=false -input=false -lockfile=readonly && tofu -chdir=infra/do-benchmark validate
      - name: Initialize and validate Hetzner configuration
        run: tofu -chdir=infra/hetzner-core/tofu init -backend=false -input=false -lockfile=readonly && tofu -chdir=infra/hetzner-core/tofu validate
      - name: Create placeholder hosted Compose env files
        run: |
          set -euo pipefail
          secrets_dir=infra/hetzner-core/server/secrets
          mkdir -p "$secrets_dir"
          for name in db postgres-admin postgres-analytics openbao matching-engine platform-runtime caddy simulator; do
            touch "$secrets_dir/$name.env"
          done
      - name: Validate Hetzner local Compose overlay
        run: docker compose -f infra/hetzner-core/server/docker-compose.yml -f infra/hetzner-core/server/docker-compose.local.yml config --quiet
      - name: Validate Hetzner stream-ack Compose overlay
        run: docker compose -f infra/hetzner-core/server/docker-compose.yml -f infra/hetzner-core/server/docker-compose.stream-ack.yml config --quiet

  go-vulnerability-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: matching-engine
            go-version-file: services/matching-engine/go.mod
            workdir: services/matching-engine
          - name: simulator
            go-version-file: services/simulator/go.mod
            workdir: services/simulator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: ${{ matrix.go-version-file }}
      - name: Run govulncheck for ${{ matrix.name }}
        uses: golang/govulncheck-action@v1
        with:
          work-dir: ${{ matrix.workdir }}

  postgres-schema-placement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Validate dev migration scripts
        run: node --test scripts/dev/lib/dev-stack.test.mjs scripts/dev/lib/dev-profiles.test.mjs scripts/dev/db/migrate.test.mjs
      - name: Start Postgres databases
        run: docker compose -f compose.base.yml -f compose.local.yml -f compose.arena.yml up -d postgres boundary-postgres projection-postgres arena-postgres --wait --wait-timeout 120
      - name: Apply migrations
        run: JS_RUNTIME=node REEF_ARENA_POSTGRES_MIGRATIONS=1 make dev-db-migrate
      - name: Run schema placement integration test
        env:
          RUNTIME_POSTGRES_JDBC_URL_TEST: jdbc:postgresql://localhost:5432/reef
          RUNTIME_POSTGRES_USER_TEST: reef
          RUNTIME_POSTGRES_PASSWORD_TEST: reef
          ARENA_POSTGRES_JDBC_URL_TEST: jdbc:postgresql://localhost:5435/reef
          ARENA_POSTGRES_USER_TEST: reef
          ARENA_POSTGRES_PASSWORD_TEST: reef
        run: ./services/platform-runtime/gradlew --no-daemon -p services/platform-runtime jar && ./services/platform-runtime/gradlew --no-daemon -p services/arena-control-plane test --tests com.reef.arena.controlplane.infrastructure.persistence.PostgresSchemaMigrationIntegrationTest
      - name: Dump Postgres logs on failure
        if: failure()
        run: docker compose -f compose.base.yml -f compose.local.yml -f compose.arena.yml logs postgres boundary-postgres projection-postgres arena-postgres
      - name: Stop Postgres
        if: always()
        run: docker compose -f compose.base.yml -f compose.local.yml -f compose.arena.yml down --volumes --remove-orphans
