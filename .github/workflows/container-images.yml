name: Container Images

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_NAMESPACE: dills122

jobs:
  detect-image-impact:
    name: Detect image-impacting changes
    runs-on: ubuntu-latest
    outputs:
      image_changed: ${{ steps.changed.outputs.image_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed paths
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${BEFORE_SHA:-}" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            changed_paths="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")"
          else
            changed_paths="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
          fi
          if printf '%s\n' "$changed_paths" | grep -Eq '^(services/(platform-runtime|matching-engine|simulator)/|\.github/workflows/container-images\.yml$)'; then
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_changed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: detect-image-impact
    if: needs.detect-image-impact.outputs.image_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: reef-platform-runtime
            context: services/platform-runtime
            dockerfile: services/platform-runtime/Dockerfile
          - image: reef-matching-engine
            context: services/matching-engine
            dockerfile: services/matching-engine/Dockerfile
          - image: reef-simulator
            context: services/simulator
            dockerfile: services/simulator/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  prerelease:
    name: Mark image set as pre-release
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Create pre-release marker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ env.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME}"
            title="Container images ${GITHUB_REF_NAME}"
          else
            release_tag="images-${short_sha}"
            title="Container images ${short_sha}"
          fi
          body="$(mktemp)"
          {
            echo "Pre-release container image set for ${GITHUB_SHA}."
            echo ""
            echo "Docker Hub tags:"
            echo "- ${DOCKERHUB_NAMESPACE}/reef-platform-runtime:sha-${short_sha}"
            echo "- ${DOCKERHUB_NAMESPACE}/reef-matching-engine:sha-${short_sha}"
            echo "- ${DOCKERHUB_NAMESPACE}/reef-simulator:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "- ${DOCKERHUB_NAMESPACE}/reef-platform-runtime:master"
              echo "- ${DOCKERHUB_NAMESPACE}/reef-matching-engine:master"
              echo "- ${DOCKERHUB_NAMESPACE}/reef-simulator:master"
              echo "- ${DOCKERHUB_NAMESPACE}/reef-platform-runtime:latest"
              echo "- ${DOCKERHUB_NAMESPACE}/reef-matching-engine:latest"
              echo "- ${DOCKERHUB_NAMESPACE}/reef-simulator:latest"
            fi
          } > "$body"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release edit "$release_tag" --prerelease --title "$title" --notes-file "$body"
          else
            gh release create "$release_tag" --target "$GITHUB_SHA" --prerelease --title "$title" --notes-file "$body"
          fi
