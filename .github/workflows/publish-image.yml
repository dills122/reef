name: Publish Image (manual)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Registry to push to
        type: choice
        options:
          - ghcr
          - dockerhub
        default: ghcr
      tag:
        description: Image tag
        type: string
        default: test

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: matching-engine
            context: services/matching-engine
            dockerfile: services/matching-engine/Dockerfile
          - name: platform-runtime
            context: services/platform-runtime
            dockerfile: services/platform-runtime/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: inputs.provider == 'ghcr'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: inputs.provider == 'dockerhub'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image ref
        id: ref
        env:
          PROVIDER: ${{ inputs.provider }}
          IMAGE_TAG: ${{ inputs.tag }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          case "$IMAGE_TAG" in
            *[!A-Za-z0-9_.-]* | [.-]* | "")
              echo "image tag must be 1-128 chars, start with [A-Za-z0-9_], and contain only [A-Za-z0-9_.-]" >&2
              exit 1
              ;;
          esac
          if [ "${#IMAGE_TAG}" -gt 128 ]; then
            echo "image tag is too long" >&2
            exit 1
          fi
          if [ "$PROVIDER" = "ghcr" ]; then
            image="ghcr.io/${REPOSITORY_OWNER}/reef-${IMAGE_NAME}:${IMAGE_TAG}"
          else
            image="docker.io/${DOCKERHUB_NAMESPACE}/reef-${IMAGE_NAME}:${IMAGE_TAG}"
          fi
          printf 'image=%s\n' "$image" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.ref.outputs.image }}
