name: Publish Image (manual)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Registry to push to
        type: choice
        options:
          - ghcr
          - dockerhub
        default: ghcr
      tag:
        description: Image tag
        type: string
        default: test

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: matching-engine
            context: services/matching-engine
            dockerfile: services/matching-engine/Dockerfile
          - name: platform-runtime
            context: services/platform-runtime
            dockerfile: services/platform-runtime/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.provider == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: inputs.provider == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image ref
        id: ref
        run: |
          if [ "${{ inputs.provider }}" = "ghcr" ]; then
            echo "image=ghcr.io/${{ github.repository_owner }}/reef-${{ matrix.name }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/reef-${{ matrix.name }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.ref.outputs.image }}
