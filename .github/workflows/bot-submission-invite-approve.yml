name: Bot Submission Invite Approval

# Trusted, manual handoff for an invite-only fork submission. This workflow is
# evaluated from the default branch and never checks out or executes fork code.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Fork bot-submission PR number
        required: true
        type: string
      head_sha:
        description: Exact current PR head SHA to approve
        required: true
        type: string
      reason:
        description: Maintainer approval reason
        required: true
        type: string

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  approve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      REQUESTED_HEAD_SHA: ${{ inputs.head_sha }}
      APPROVAL_REASON: ${{ inputs.reason }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify maintainer and live fork SHA
        id: trusted-inputs
        run: |
          test "$PR_NUMBER" -gt 0
          test "${#REQUESTED_HEAD_SHA}" -ge 40
          test "${#APPROVAL_REASON}" -gt 0
          permission=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${GITHUB_ACTOR}/permission" --jq .permission)
          case "$permission" in maintain|admin) ;; *) echo "maintainer permission required" >&2; exit 1 ;; esac
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/reef-bot-submission-pr.json
          node -e '
            const fs = require("fs");
            const pr = JSON.parse(fs.readFileSync("/tmp/reef-bot-submission-pr.json", "utf8"));
            const sha = pr.head?.sha;
            if (!pr.head?.repo?.fork || !/^[0-9a-f]{40,64}$/i.test(sha ?? "")) throw new Error("current PR is not a valid fork submission");
            if (sha !== process.env.REQUESTED_HEAD_SHA) throw new Error("requested SHA is not the current PR head");
            const values = { repository: process.env.GITHUB_REPOSITORY, pullRequestNumber: Number(process.env.PR_NUMBER), headSha: sha, reason: process.env.APPROVAL_REASON };
            if (!Number.isSafeInteger(values.pullRequestNumber)) throw new Error("invalid trusted PR identity");
            fs.writeFileSync("/tmp/reef-admission-approval.json", JSON.stringify(values));
          '
      - name: Approve matching admission
        env:
          ARENA_ADMIN_API_URL: ${{ secrets.ARENA_ADMIN_API_URL }}
          ARENA_ADMIN_API_TOKEN: ${{ secrets.ARENA_ADMIN_API_TOKEN }}
        run: |
          test -n "$ARENA_ADMIN_API_URL" && test -n "$ARENA_ADMIN_API_TOKEN"
          actor_id=$(gh api "users/${GITHUB_ACTOR}" --jq .id)
          case "$actor_id" in ''|*[!0-9]*) echo "invalid maintainer identity" >&2; exit 1 ;; esac
          APPROVER_ACTOR_ID="user-gh-${actor_id}" node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync("/tmp/reef-admission-approval.json", "utf8"));
            payload.approverActorId = process.env.APPROVER_ACTOR_ID;
            fs.writeFileSync("/tmp/reef-admission-approval.json", JSON.stringify(payload));
          '
          curl --fail-with-body --request POST "${ARENA_ADMIN_API_URL%/}/admin/v1/arena/submission-admissions/approve" \
            --header "authorization: Bearer ${ARENA_ADMIN_API_TOKEN}" \
            --header "content-type: application/json" \
            --data-binary @/tmp/reef-admission-approval.json
      - name: Dispatch trusted provisioning
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run bot-submission-provision.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f "pr_number=$PR_NUMBER"
