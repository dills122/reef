version: 2

multi-ecosystem-groups:
  matching-engine:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Toronto"

  simulator:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "America/Toronto"

  jvm-services:
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "America/Toronto"

  javascript-apps:
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "America/Toronto"

  infrastructure:
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "America/Toronto"

updates:
  - package-ecosystem: "gomod"
    directory: "/services/matching-engine"
    patterns:
      - "*"
    multi-ecosystem-group: "matching-engine"

  - package-ecosystem: "docker"
    directory: "/services/matching-engine"
    patterns:
      - "*"
    multi-ecosystem-group: "matching-engine"

  - package-ecosystem: "gomod"
    directory: "/services/simulator"
    patterns:
      - "*"
    multi-ecosystem-group: "simulator"

  - package-ecosystem: "docker"
    directory: "/services/simulator"
    patterns:
      - "*"
    multi-ecosystem-group: "simulator"

  - package-ecosystem: "gradle"
    directories:
      - "/services/arena-control-plane"
      - "/services/platform-runtime"
      - "/services/stock-data"
    patterns:
      - "*"
    multi-ecosystem-group: "jvm-services"

  - package-ecosystem: "docker"
    directories:
      - "/services/arena-control-plane"
      - "/services/platform-runtime"
      - "/services/stock-data"
    patterns:
      - "*"
    multi-ecosystem-group: "jvm-services"

  - package-ecosystem: "bun"
    directories:
      - "/"
      - "/apps/arena-admin"
      - "/packages/bot-sdk"
    patterns:
      - "*"
    multi-ecosystem-group: "javascript-apps"

  # The docs deployment uses npm and package-lock.json in CI.
  - package-ecosystem: "npm"
    directory: "/apps/docs-site"
    patterns:
      - "*"
    multi-ecosystem-group: "javascript-apps"

  - package-ecosystem: "docker"
    directory: "/infra/hetzner-core/server/deploy-receiver"
    patterns:
      - "*"
    multi-ecosystem-group: "javascript-apps"

  - package-ecosystem: "docker-compose"
    directories:
      - "/"
      - "/infra/hetzner-core/server"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"

  - package-ecosystem: "opentofu"
    directories:
      - "/infra/do-benchmark"
      - "/infra/hetzner-core/tofu"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "America/Toronto"
    groups:
      repository-automation:
        patterns:
          - "*"
