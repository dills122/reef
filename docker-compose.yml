  redis:
    image: redis:7-alpine
    container_name: reef-redis
    profiles: ["redis"]
    ports:
      - "${REEF_REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.11-alpine
    container_name: reef-nats
    command: ["-js", "-sd", "/data/jetstream", "-m", "8222"]
    ports:
      - "${REEF_NATS_HOST_PORT:-4222}:4222"
      - "${REEF_NATS_MONITOR_HOST_PORT:-8222}:8222"
    volumes:
      - reef-nats-data:/data/jetstream
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats-box:
    image: natsio/nats-box:0.18.0
    profiles: ["stream-ack-tools"]
    depends_on:
      nats:
        condition: service_healthy

  redpanda:
    image: redpandadata/redpanda:v26.1.1
    container_name: reef-redpanda
    profiles: ["redpanda"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "${REEF_REDPANDA_SMP:-2}"
      - --memory
      - "${REEF_REDPANDA_MEMORY:-2G}"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:9092"
      - --pandaproxy-addr
      - "0.0.0.0:8082"
      - --advertise-pandaproxy-addr
      - "redpanda:8082"
      - --schema-registry-addr
      - "0.0.0.0:8081"
    ports:
      - "${REEF_REDPANDA_KAFKA_HOST_PORT:-9092}:9092"
      - "${REEF_REDPANDA_PROXY_HOST_PORT:-18082}:8082"
      - "${REEF_REDPANDA_SCHEMA_REGISTRY_HOST_PORT:-18083}:8081"
      - "${REEF_REDPANDA_ADMIN_HOST_PORT:-19644}:9644"
    volumes:
      - reef-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: reef-jaeger
    profiles: ["observability"]
    ports:
      - "${REEF_JAEGER_UI_HOST_PORT:-16686}:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: reef-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./scripts/dev/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger
    ports:
      - "${REEF_OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${REEF_OTEL_HTTP_HOST_PORT:-4318}:4318"

volumes:
  reef-postgres-data:
  reef-boundary-postgres-data:
  reef-projection-postgres-data:
  reef-arena-postgres-data:
  reef-nats-data:
  reef-redpanda-data:
