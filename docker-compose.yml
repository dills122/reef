  matching-engine:
    build:
      context: ./services/matching-engine
      dockerfile: Dockerfile
    container_name: reef-matching-engine
    environment:
      MATCHING_ENGINE_ADDR: ":8081"
      MATCHING_ENGINE_ENABLE_GRPC: "${MATCHING_ENGINE_ENABLE_GRPC:-1}"
      MATCHING_ENGINE_GRPC_ADDR: ":9081"
      MATCHING_ENGINE_DIRECT_STREAM_ENABLED: "${MATCHING_ENGINE_DIRECT_STREAM_ENABLED:-false}"
      MATCHING_ENGINE_SHARD_ID: "${MATCHING_ENGINE_SHARD_ID:-engine-0}"
      MATCHING_ENGINE_DIRECT_STREAM_PARTITIONS: "${MATCHING_ENGINE_DIRECT_STREAM_PARTITIONS:-}"
      MATCHING_ENGINE_DIRECT_STREAM_DURABLE_PREFIX: "${MATCHING_ENGINE_DIRECT_STREAM_DURABLE_PREFIX:-reef-engine-direct}"
