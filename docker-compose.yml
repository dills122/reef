x-platform-runtime-service: &platform-runtime-service
  build: *platform-runtime-build
  environment:
    <<: *platform-runtime-environment
  depends_on:
    postgres:
      condition: service_healthy
    boundary-postgres:
      condition: service_healthy
    projection-postgres:
      condition: service_healthy
    arena-postgres:
      condition: service_healthy
    matching-engine:
      condition: service_healthy
    nats:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
    interval: 5s
    timeout: 3s
    retries: 20

services:
  postgres:
    image: postgres:16-alpine
    container_name: reef-postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=${REEF_PG_MAX_CONNECTIONS:-200}"
      - "-c"
      - "max_wal_size=${REEF_PG_MAX_WAL_SIZE:-16GB}"
      - "-c"
      - "min_wal_size=${REEF_PG_MIN_WAL_SIZE:-4GB}"
      - "-c"
      - "checkpoint_timeout=${REEF_PG_CHECKPOINT_TIMEOUT:-15min}"
      - "-c"
      - "checkpoint_completion_target=${REEF_PG_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${REEF_PG_WAL_COMPRESSION:-on}"
      - "-c"
      - "log_checkpoints=${REEF_PG_LOG_CHECKPOINTS:-on}"
    environment:
      POSTGRES_DB: reef
      POSTGRES_USER: reef
      POSTGRES_PASSWORD: reef
    ports:
      - "${REEF_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - reef-postgres-data:/var/lib/postgresql/data
      - ./scripts/dev/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reef -d reef"]
      interval: 5s
      timeout: 3s
      retries: 20

  projection-postgres:
    image: postgres:16-alpine
    container_name: reef-projection-postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=${REEF_PROJECTION_PG_MAX_CONNECTIONS:-160}"
      - "-c"
      - "max_wal_size=${REEF_PROJECTION_PG_MAX_WAL_SIZE:-16GB}"
      - "-c"
      - "min_wal_size=${REEF_PROJECTION_PG_MIN_WAL_SIZE:-4GB}"
      - "-c"
      - "checkpoint_timeout=${REEF_PROJECTION_PG_CHECKPOINT_TIMEOUT:-15min}"
      - "-c"
      - "checkpoint_completion_target=${REEF_PROJECTION_PG_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${REEF_PROJECTION_PG_WAL_COMPRESSION:-on}"
      - "-c"
      - "log_checkpoints=${REEF_PROJECTION_PG_LOG_CHECKPOINTS:-on}"
    environment:
      POSTGRES_DB: reef
      POSTGRES_USER: reef
      POSTGRES_PASSWORD: reef
    ports:
