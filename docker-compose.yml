services:
  postgres:
    image: postgres:16-alpine
    container_name: reef-postgres
    command:
      - "postgres"
      - "-c"
      - "max_wal_size=${REEF_PG_MAX_WAL_SIZE:-16GB}"
      - "-c"
      - "min_wal_size=${REEF_PG_MIN_WAL_SIZE:-4GB}"
      - "-c"
      - "checkpoint_timeout=${REEF_PG_CHECKPOINT_TIMEOUT:-15min}"
      - "-c"
      - "checkpoint_completion_target=${REEF_PG_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${REEF_PG_WAL_COMPRESSION:-on}"
      - "-c"
      - "log_checkpoints=${REEF_PG_LOG_CHECKPOINTS:-on}"
    environment:
      POSTGRES_DB: reef
      POSTGRES_USER: reef
      POSTGRES_PASSWORD: reef
    ports:
      - "${REEF_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - reef-postgres-data:/var/lib/postgresql/data
      - ./scripts/dev/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reef -d reef"]
      interval: 5s
      timeout: 3s
      retries: 20

  matching-engine:
    build:
      context: ./services/matching-engine
      dockerfile: Dockerfile
    container_name: reef-matching-engine
    environment:
      MATCHING_ENGINE_ADDR: ":8081"
      MATCHING_ENGINE_ENABLE_GRPC: "${MATCHING_ENGINE_ENABLE_GRPC:-1}"
      MATCHING_ENGINE_GRPC_ADDR: ":9081"
      OTEL_SERVICE_NAME: "reef-matching-engine"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    ports:
      - "${REEF_MATCHING_ENGINE_HOST_PORT:-8081}:8081"
      - "${REEF_MATCHING_ENGINE_GRPC_HOST_PORT:-9081}:9081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  platform-runtime:
    build:
      context: ./services/platform-runtime
      dockerfile: Dockerfile
    container_name: reef-platform-runtime
    environment:
      PLATFORM_RUNTIME_PORT: "8080"
      OTEL_SERVICE_NAME: "reef-platform-runtime"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      ENGINE_TRANSPORT: "${ENGINE_TRANSPORT:-grpc}"
      MATCHING_ENGINE_BASE_URL: "http://matching-engine:8081"
      MATCHING_ENGINE_GRPC_TARGET: "${MATCHING_ENGINE_GRPC_TARGET:-matching-engine:9081}"
      ENGINE_GRPC_DEADLINE_MS: "${ENGINE_GRPC_DEADLINE_MS:-2000}"
      RUNTIME_PERSISTENCE: "postgres"
      RUNTIME_DB_BOOTSTRAP_MODE: "${RUNTIME_DB_BOOTSTRAP_MODE:-validate}"
      RUNTIME_POSTGRES_JDBC_URL: "jdbc:postgresql://postgres:5432/reef?currentSchema=runtime"
      RUNTIME_POSTGRES_USER: "reef"
      RUNTIME_POSTGRES_PASSWORD: "reef"
      EXTERNAL_API_IDEMPOTENCY_STORE: "${EXTERNAL_API_IDEMPOTENCY_STORE:-postgres}"
      RUNTIME_DB_URL: "jdbc:postgresql://postgres:5432/reef?currentSchema=boundary"
      RUNTIME_DB_USER: "reef"
      RUNTIME_DB_PASSWORD: "reef"
      PLATFORM_LEGACY_MUTATION_ROUTES_ENABLED: "${PLATFORM_LEGACY_MUTATION_ROUTES_ENABLED:-true}"
      EXTERNAL_API_COMMAND_CAPTURE_MODE: "${EXTERNAL_API_COMMAND_CAPTURE_MODE:-postgres}"
      EXTERNAL_API_COMMAND_LOG_MODE: "${EXTERNAL_API_COMMAND_LOG_MODE:-disabled}"
      EXTERNAL_API_COMMAND_LOG_APPEND_MODE: "${EXTERNAL_API_COMMAND_LOG_APPEND_MODE:-inline}"
      EXTERNAL_API_COMMAND_LOG_PAYLOAD_MODE: "${EXTERNAL_API_COMMAND_LOG_PAYLOAD_MODE:-side-table}"
      EXTERNAL_API_COMMAND_PROCESSING_MODE: "${EXTERNAL_API_COMMAND_PROCESSING_MODE:-sync-result}"
      EXTERNAL_API_COMMAND_ASYNC_WORKER_ENABLED: "${EXTERNAL_API_COMMAND_ASYNC_WORKER_ENABLED:-false}"
      EXTERNAL_API_COMMAND_ASYNC_WORKER_THREADS: "${EXTERNAL_API_COMMAND_ASYNC_WORKER_THREADS:-1}"
      EXTERNAL_API_COMMAND_ASYNC_WORKER_BATCH_SIZE: "${EXTERNAL_API_COMMAND_ASYNC_WORKER_BATCH_SIZE:-100}"
      EXTERNAL_API_COMMAND_ASYNC_WORKER_POLL_MS: "${EXTERNAL_API_COMMAND_ASYNC_WORKER_POLL_MS:-25}"
      EXTERNAL_API_COMMAND_ASYNC_WORKER_LEASE_MS: "${EXTERNAL_API_COMMAND_ASYNC_WORKER_LEASE_MS:-30000}"
      EXTERNAL_API_COMMAND_ASYNC_WORKER_DEDICATED_RUNTIME_POOL_ENABLED: "${EXTERNAL_API_COMMAND_ASYNC_WORKER_DEDICATED_RUNTIME_POOL_ENABLED:-false}"
      EXTERNAL_API_COMMAND_INTAKE_MAX_ACTIVE_COMMANDS: "${EXTERNAL_API_COMMAND_INTAKE_MAX_ACTIVE_COMMANDS:-0}"
      EXTERNAL_API_COMMAND_INTAKE_MAX_STALE_PROCESSING: "${EXTERNAL_API_COMMAND_INTAKE_MAX_STALE_PROCESSING:-0}"
      EXTERNAL_API_COMMAND_INTAKE_BACKPRESSURE_SAMPLE_MS: "${EXTERNAL_API_COMMAND_INTAKE_BACKPRESSURE_SAMPLE_MS:-100}"
      STREAM_ACK_NATS_URL: "${STREAM_ACK_NATS_URL:-nats://nats:4222}"
      STREAM_ACK_COMMAND_STREAM: "${STREAM_ACK_COMMAND_STREAM:-REEF_COMMANDS}"
      STREAM_ACK_SUBJECT_PREFIX: "${STREAM_ACK_SUBJECT_PREFIX:-reef.cmd.v1}"
      STREAM_ACK_PARTITION_COUNT: "${STREAM_ACK_PARTITION_COUNT:-16}"
      STREAM_ACK_INTAKE_STORE: "${STREAM_ACK_INTAKE_STORE:-postgres}"
      STREAM_ACK_PUBLISH_ACK_TIMEOUT_MS: "${STREAM_ACK_PUBLISH_ACK_TIMEOUT_MS:-2000}"
      STREAM_ACK_MAX_STORAGE_UTILIZATION: "${STREAM_ACK_MAX_STORAGE_UTILIZATION:-0.95}"
      STREAM_ACK_WORKER_ENABLED: "${STREAM_ACK_WORKER_ENABLED:-false}"
      STREAM_ACK_WORKER_PARTITIONS: "${STREAM_ACK_WORKER_PARTITIONS:-0}"
      STREAM_ACK_WORKER_BATCH_SIZE: "${STREAM_ACK_WORKER_BATCH_SIZE:-100}"
      STREAM_ACK_WORKER_POLL_MS: "${STREAM_ACK_WORKER_POLL_MS:-25}"
      STREAM_ACK_WORKER_FETCH_TIMEOUT_MS: "${STREAM_ACK_WORKER_FETCH_TIMEOUT_MS:-200}"
      STREAM_ACK_WORKER_ACK_WAIT_MS: "${STREAM_ACK_WORKER_ACK_WAIT_MS:-30000}"
      STREAM_ACK_WORKER_DURABLE_PREFIX: "${STREAM_ACK_WORKER_DURABLE_PREFIX:-reef-stream-worker}"
      EXTERNAL_API_ABUSE_BREAKER_MODE: "${EXTERNAL_API_ABUSE_BREAKER_MODE:-off}"
      EXTERNAL_API_ABUSE_BREAKER_ENABLED: "${EXTERNAL_API_ABUSE_BREAKER_ENABLED:-true}"
      EXTERNAL_API_ABUSE_BREAKER_REJECT_RATE_ENABLED: "${EXTERNAL_API_ABUSE_BREAKER_REJECT_RATE_ENABLED:-true}"
      EXTERNAL_API_ABUSE_BREAKER_MAX_REJECTS: "${EXTERNAL_API_ABUSE_BREAKER_MAX_REJECTS:-50}"
      EXTERNAL_API_ABUSE_BREAKER_WINDOW_SECONDS: "${EXTERNAL_API_ABUSE_BREAKER_WINDOW_SECONDS:-30}"
      EXTERNAL_API_ABUSE_BREAKER_BLOCK_SECONDS: "${EXTERNAL_API_ABUSE_BREAKER_BLOCK_SECONDS:-60}"
      EXTERNAL_API_ABUSE_BREAKER_REJECT_CODES: "${EXTERNAL_API_ABUSE_BREAKER_REJECT_CODES:-INVALID_STATE,NOT_FOUND,REFERENCE_DATA_ERROR,VALIDATION_ERROR}"
      EXTERNAL_API_ABUSE_BREAKER_ROUTES: "${EXTERNAL_API_ABUSE_BREAKER_ROUTES:-/api/v1/orders/submit,/api/v1/orders/modify,/api/v1/orders/cancel}"
      EXTERNAL_API_ABUSE_BREAKER_ROUTE_POLICIES: "${EXTERNAL_API_ABUSE_BREAKER_ROUTE_POLICIES:-}"
      EXTERNAL_API_ABUSE_BREAKER_WARN_ONLY: "${EXTERNAL_API_ABUSE_BREAKER_WARN_ONLY:-false}"
      PLATFORM_HTTP_THREADS: "${PLATFORM_HTTP_THREADS:-64}"
      RUNTIME_DB_POOL_MAX: "${RUNTIME_DB_POOL_MAX:-48}"
      RUNTIME_DB_POOL_MIN_IDLE: "${RUNTIME_DB_POOL_MIN_IDLE:-16}"
      RUNTIME_DB_POOL_CONN_TIMEOUT_MS: "${RUNTIME_DB_POOL_CONN_TIMEOUT_MS:-2000}"
      RUNTIME_DB_POOL_COMMAND_LOG_MAX: "${RUNTIME_DB_POOL_COMMAND_LOG_MAX:-}"
      RUNTIME_DB_POOL_COMMAND_LOG_MIN_IDLE: "${RUNTIME_DB_POOL_COMMAND_LOG_MIN_IDLE:-}"
      RUNTIME_DB_POOL_RUNTIME_MAX: "${RUNTIME_DB_POOL_RUNTIME_MAX:-}"
      RUNTIME_DB_POOL_RUNTIME_MIN_IDLE: "${RUNTIME_DB_POOL_RUNTIME_MIN_IDLE:-}"
      RUNTIME_DB_POOL_ASYNC_RUNTIME_MAX: "${RUNTIME_DB_POOL_ASYNC_RUNTIME_MAX:-}"
      RUNTIME_DB_POOL_ASYNC_RUNTIME_MIN_IDLE: "${RUNTIME_DB_POOL_ASYNC_RUNTIME_MIN_IDLE:-}"
      RUNTIME_DB_POOL_IDEMPOTENCY_MAX: "${RUNTIME_DB_POOL_IDEMPOTENCY_MAX:-}"
      RUNTIME_DB_POOL_IDEMPOTENCY_MIN_IDLE: "${RUNTIME_DB_POOL_IDEMPOTENCY_MIN_IDLE:-}"
      RUNTIME_DB_POOL_COMMAND_CAPTURE_MAX: "${RUNTIME_DB_POOL_COMMAND_CAPTURE_MAX:-}"
      RUNTIME_DB_POOL_COMMAND_CAPTURE_MIN_IDLE: "${RUNTIME_DB_POOL_COMMAND_CAPTURE_MIN_IDLE:-}"
    ports:
      - "${REEF_PLATFORM_RUNTIME_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: reef-redis
    profiles: ["redis"]
    ports:
      - "${REEF_REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.11-alpine
    container_name: reef-nats
    profiles: ["stream-ack"]
    command: ["-js", "-sd", "/data/jetstream", "-m", "8222"]
    ports:
      - "${REEF_NATS_HOST_PORT:-4222}:4222"
      - "${REEF_NATS_MONITOR_HOST_PORT:-8222}:8222"
    volumes:
      - reef-nats-data:/data/jetstream
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats-box:
    image: natsio/nats-box:0.18.0
    profiles: ["stream-ack-tools"]
    depends_on:
      nats:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: reef-jaeger
    profiles: ["observability"]
    ports:
      - "${REEF_JAEGER_UI_HOST_PORT:-16686}:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: reef-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./scripts/dev/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger
    ports:
      - "${REEF_OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${REEF_OTEL_HTTP_HOST_PORT:-4318}:4318"

volumes:
  reef-postgres-data:
  reef-nats-data:
